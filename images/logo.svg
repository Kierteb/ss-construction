    <path d="M20 62 L20 88 Q75 100 130 88 L130 62 L75 18 Z"/>
  </g>
  <!-- Back house (smaller, offset right) -->
  <g stroke="currentColor" stroke-width="5" stroke-linejoin="round" stroke-linecap="round">
    <path d="M140 62 L140 88 L250 88 L250 62 L195 28 Z"/>
    <!-- Small chimney detail -->
    <polyline points="220,42 220,30 232,30 232,48"/>
  </g>
  <!-- Text -->
  <text x="160" y="15" text-anchor="middle" dominant-baseline="hanging"
        font-family="'Inter', Arial, sans-serif" font-weight="800"
        font-size="1" letter-spacing="0" fill="currentColor" stroke="none"
        opacity="0">SS CONSTRUCTION</text>
</svg>